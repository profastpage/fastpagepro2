<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="35%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0A0A0A"/>
  <!-- Lightning bolt + F integrated logo -->
  <g filter="url(#glow)">
    <!-- F letter stem -->
    <rect x="8" y="6" width="3.5" height="20" rx="1" fill="url(#boltGrad)"/>
    <!-- F letter top bar -->
    <rect x="8" y="6" width="12" height="3.5" rx="1" fill="url(#boltGrad)"/>
    <!-- F letter middle bar -->
    <rect x="8" y="13" width="9" height="3" rx="1" fill="url(#boltGrad)"/>
    <!-- Lightning bolt tip - extends from F middle bar -->
    <path d="M20.5 6 L14 17.5 L18.5 17.5 L12.5 28 L24 14 L19 14 Z" fill="url(#boltGrad)"/>
  </g>
</svg>
